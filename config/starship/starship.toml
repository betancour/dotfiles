# Starship prompt — https://starship.rs
# Linked to ~/.config/starship.toml by the installer when present.

"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 500

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
symbol = ""
style = "bold cyan"
format = "([$symbol$branch]($style) )"

[git_status]
style = "bold yellow"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted = "⇕"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "●"
staged = "+"
renamed = "»"
deleted = "✘"

[username]
style_user = "bold purple"
format = "[$user]($style)@"
show_always = false

[hostname]
ssh_only = true
format = "[$hostname](bold cyan) "
disabled = false

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "
