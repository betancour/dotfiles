# Sabre GDS terminal theme
# Inspired by vintage airline reservation terminals (IBM 3270 / DEC VT220)

[colors.primary]
background = "#000000"
foreground = "#00ff66"

[colors.cursor]
text   = "#000000"
cursor = "#00ff66"

[colors.selection]
text       = "#000000"
background = "#00ff66"

[colors.normal]
black   = "#000000"
red     = "#009933"
green   = "#00ff66"
yellow  = "#66ff66"
blue    = "#00cc99"
magenta = "#00ffcc"
cyan    = "#33ff99"
white   = "#ccffcc"

[colors.bright]
black   = "#003300"
red     = "#00cc66"
green   = "#33ff99"
yellow  = "#99ff99"
blue    = "#00ffcc"
magenta = "#00ffff"
cyan    = "#66ff99"
white   = "#ffffff"
