# IBM 5153 — authentic CGA palette emulation
#
# Based on measured output from the IBM 5153 Personal Computer Color Display.
# Sources:
# - https://int10h.org/blog/2022/06/ibm-5153-color-true-cga-palette/
# - https://aceinnova.com/en/electronics/cga-and-the-brown-color-in-ibm-5153-color-display/

[colors.primary]
background = "#000000"
foreground = "#aaaaaa"

[colors.cursor]
text   = "#000000"
cursor = "#aaaaaa"

[colors.selection]
text       = "#000000"
background = "#aaaaaa"

[colors.normal]
black   = "#000000"
red     = "#aa0000"
green   = "#00aa00"
yellow  = "#aa5500"
blue    = "#0000aa"
magenta = "#aa00aa"
cyan    = "#00aaaa"
white   = "#aaaaaa"

[colors.bright]
black   = "#555555"
red     = "#ff5555"
green   = "#55ff55"
yellow  = "#ffff55"
blue    = "#5555ff"
magenta = "#ff55ff"
cyan    = "#55ffff"
white   = "#ffffff"
