# Alacritty entrypoint — Alacritty >= 0.13 (TOML)
# Docs: https://alacritty.org/config-alacritty.html
#
# Import order: earlier modules set defaults; later modules override.
# Switch theme/font only in theme.toml and font.toml.

[general]
live_config_reload = true
import = [
  "theme.toml",
  "font.toml",
  "font-size.toml",
  "terminal.toml",
  "window.toml",
  "keys.toml",
]
