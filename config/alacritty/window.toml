# Window chrome and layout.
# Position is intentionally omitted so the window manager places the window
# (portable across displays and machines).

[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
# "Buttonless" / "Transparent" are macOS-only; "None" is portable.
decorations = "None"
opacity = 0.90
blur = true
startup_mode = "Windowed"
dynamic_title = true
# macOS only — ignored elsewhere: Option as Alt for readline/tmux/vim
option_as_alt = "Both"
dimensions = { columns = 140, lines = 45 }
