# =============================================
#  ULTRA LOW-POWER + YOUR PREFERENCES
# =============================================

[general]
live_config_reload = false          # Saves CPU
ipc_socket = false

[env]
COLORTERM = "truecolor"

[terminal]
osc52 = "OnlyCopy"

[terminal.shell]
program = "/bin/zsh"
args = ["-l"]

[window]
dynamic_title = false
decorations = "None"
opacity = 1.0
blur = false
startup_mode = "Windowed"

[scrolling]
history = 5000                      # Reduced from 50k (big power + memory saver)
multiplier = 3

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true
thickness = 0.15

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

[mouse]
hide_when_typing = true

[bell]
# "None" is invalid in Alacritty 0.17+; duration = 0 disables the visual bell
animation = "Linear"
duration = 0

[debug]
renderer = "gles2"                  # Most important for battery
# renderer = "gles2pure"            # Try this if you want even lower GPU usage
# vsync removed — unused in Alacritty 0.17+
render_timer = false
persistent_logging = false
log_level = "Off"
prefer_egl = true
